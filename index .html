<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <title>تیز اردو کوئز Quiz - Prefetch 4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {margin:0;font-family:'Noto Naskh Arabic',Segoe UI,Arial,sans-serif;background:#f8f9fa;color:#222;padding-bottom:110px;}
    body.dark {background:#191d21;color:#e5e5e5;}
    .container{max-width:500px;margin:38px auto 0 auto;padding:20px;background:#fff;border-radius:14px;box-shadow:0 4px 14px rgba(40,40,40,0.08);}
    body.dark .container{background:#26292e;}
    .settings{display:flex;justify-content:flex-end;gap:8px;}
    .toggle-switch{padding:6px 14px;border-radius:16px;background:#f8f9fa;border:1px solid #eee;font-size:1rem;cursor:pointer;}
    body.dark .toggle-switch{background:#23272c;color:#aae;}
    .settings-menu{display:none;position:absolute;right:20px;top:70px;background:#fff;border:1px solid #eee;border-radius:10px;box-shadow:0 2px 14px rgba(0,0,0,.09);z-index:99;min-width:180px;padding:10px 22px;}
    body.dark .settings-menu{background:#282d33;border-color:#25282b;}
    .settings-menu label{display:block;margin-top:11px;}
    .settings-menu .wa-link{display:block;color:#25d366;margin:11px 0 6px 0;text-decoration:none;}
    .settings-menu .phones-list{color:#888;font-size:.98em;margin-top:6px;}
    .card{background:#f8f9fa;border-radius:8px;border:1px solid #eee;padding:19px 13px 11px 13px;margin-bottom:10px;min-height:90px;}
    body.dark .card{background:#23272c;border-color:#25282b;}
    .options{margin-top:9px;display:flex;flex-direction:column;gap:7px;}
    .option-btn{background:#f4f6f8;font-size:1.12em;color:#1d282d;border-radius:8px;padding:10px 8px 10px 14px;border:1.8px solid #eee;text-align:left;cursor:pointer;display:flex;align-items:center;gap:9px;transition:background .14s;}
    body.dark .option-btn{background:#23272c;color:#eee;border:1.2px solid #181b22;}
    .option-btn[data-correct="true"].selected{background:#21ae48!important;color:#fff!important;border:2px solid #21ae48;}
    .option-btn[data-correct="false"].selected{background:#cb2828!important;color:#fff!important;border:2px solid #cb2828;}
    .option-btn:disabled{cursor:not-allowed;opacity:0.80;}
    .actions{margin-top:15px;}
    .actions button{background:#007bff;color:#fff;border:none;border-radius:22px;cursor:pointer;padding:8px 17px;font-size:1.08em;font-weight:bold;}
    .actions button:active{transform:scale(.96);}
    .actions button:disabled{opacity:0.65;cursor:not-allowed;}
    .likes{display:flex;align-items:center;gap:7px;margin:7px 0 0 3px;font-size:1em;}
    .likes .like-count{font-weight:bold;}
    .translation{background:#eaf4ff;color:#1c1d22;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:1.05em;min-height:32px;border-right:4px solid #007bff;line-height:1.6;}
    body.dark .translation{background:#1d303e;color:#e1f0fa;border-right-color:#4a9eff;}
    .bottom-bar{position:fixed;left:0;right:0;bottom:0;background:#fff;height:100px;box-shadow:0 -2px 12px rgba(0,0,0,0.13);border-top:2px solid #eee;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
    body.dark .bottom-bar{background:#23272c;border-color:#25282b;}
    .phones-list{margin:8px 0 2px 0;}
    .spinner{display:inline-block;width:23px;height:23px;border:3px solid #eee;border-top:3px solid #007bff;border-radius:50%;animation:spin .95s linear infinite;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .num{display:inline-block;background:#ddd;color:#222;border-radius:50%;font-size:.95em;width:28px;height:28px;text-align:center;line-height:28px;margin-right:10px;}
    body.dark .num{background:#111;color:#93dfc4;}
    #timer{font-size:1.15em;margin-bottom:13px;font-weight:bold;color:#007bff;letter-spacing:2px;min-height:28px;display:inline-block;}
    .translation .spinner{margin-left:8px;}
    @media(max-width:640px){.container{max-width:100vw;}}
  </style>
</head>
<body>
  <div class="container">
    <div class="settings">
      <button class="toggle-switch" id="darkBtn">🌘 Dark</button>
      <button class="toggle-switch" id="settingsBtn">⚙️</button>
      <div class="settings-menu" id="settingsMenu">
        <label>
          زبان:
          <select id="langSelect">
            <option value="ur">اردو</option>
            <option value="hi">ہندی</option>
            <option value="ar">عربی</option>
            <option value="fr">فرانسیسی</option>
            <option value="en">انگلش</option>
          </select>
        </label>
        <a class="wa-link" href="https://chat.whatsapp.com/K0tCsOCduSR8050qEZ3sQg" target="_blank">Whatsapp گروپ</a>
        <div class="phones-list">03437878299 | 03299344300 | 03375418495</div>
      </div>
    </div>
    <h2>اردو کوئز - GoQuiz</h2>
    <div id="timer"></div>
    <div class="card" id="questionCard">
      <center><span class="spinner"></span> سوال لوڈ ہو رہا ہے ...</center>
    </div>
    <div class="translation" id="translationDiv"></div>
    <div class="likes">
      <button id="likeBtn">❤️ Like</button>
      <span class="like-count" id="likeCount">0</span>
    </div>
    <div class="actions">
      <button id="nextQBtn" disabled>⏭️ اگلا سوال</button>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="phones-list">
      <span>03437878299 | 03299344300 | 03375418495</span>
    </div>
  </div>
  <script>
    // --- SETTINGS
    const settingsBtn = document.getElementById("settingsBtn");
    const settingsMenu = document.getElementById("settingsMenu");
    settingsBtn.onclick = e=>{
      settingsMenu.style.display = settingsMenu.style.display === "block" ? "none" : "block";
      e.stopPropagation();
    };
    document.body.addEventListener("click",()=>settingsMenu.style.display="none");
    settingsMenu.onclick = e=>e.stopPropagation();
    
    // DARK
    const darkBtn=document.getElementById("darkBtn");
    darkBtn.onclick=()=>{document.body.classList.toggle('dark');localStorage.setItem('quiz_dark',document.body.classList.contains('dark') ? "1":"0")};
    if(localStorage.getItem('quiz_dark')==="1")document.body.classList.add('dark');
    
    // LANGUAGE
    const langSelect=document.getElementById("langSelect");
    langSelect.value=localStorage.getItem("quiz_lang")||"ur";

    // --- LOGIC
    const questionCard=document.getElementById("questionCard");
    const translationDiv=document.getElementById("translationDiv");
    const likeBtn=document.getElementById("likeBtn");
    const likeCountSpan=document.getElementById("likeCount");
    const nextQBtn=document.getElementById("nextQBtn");
    const timerDiv=document.getElementById("timer");

    let qNumber=1, likes=0, questionsQueue=[], timerI=null, showingIndex=0;
    let canAnswer = false;
    let translationCompleted = false;

    // --- Utilities
    function shuffle(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
    function decodeHTMLEntities(t){let txt=document.createElement("textarea");txt.innerHTML=t;return txt.value;}
    function delay(ms){return new Promise(r=>setTimeout(r,ms));}

    // --- MyMemory Translation API (FREE, NO KEY NEEDED)
    async function translateWithMyMemory(text, targetLang) {
      try {
        // Clean the text
        let cleanText = text.replace(/(<([^>]+)>)/gi, "").substring(0, 500); // MyMemory has limit
        
        // Use MyMemory API - completely free, no key required
        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(cleanText)}&langpair=en|${targetLang}`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.responseData && data.responseData.translatedText) {
          return data.responseData.translatedText;
        } else {
          throw new Error("Translation failed");
        }
      } catch (error) {
        console.log("Translation error, using fallback");
        // Fallback to a simple method if API fails
        return simpleFallbackTranslation(text);
      }
    }

    // --- Simple fallback translation (when API fails)
    function simpleFallbackTranslation(text) {
      // Common question patterns
      if (text.includes("What is")) return text.replace("What is", "کیا ہے").replace("the", "");
      if (text.includes("Who is")) return text.replace("Who is", "کون ہے").replace("the", "");
      if (text.includes("Where is")) return text.replace("Where is", "کہاں ہے").replace("the", "");
      if (text.includes("When is")) return text.replace("When is", "کب ہے").replace("the", "");
      if (text.includes("Why is")) return text.replace("Why is", "کیوں ہے").replace("the", "");
      if (text.includes("How is")) return text.replace("How is", "کیسے ہے").replace("the", "");
      
      // Add "کا سوال" at the end to indicate it's a question
      return text + " (کا سوال)";
    }

    // --- Prefetching logic with translation
    async function prefetchQueue(desiredLen){
      while(questionsQueue.length < desiredLen){
        let resp=null, data=null, qd=null;
        for(let i=0;i<5;i++){
          try{
            resp=await fetch("https://opentdb.com/api.php?amount=1&type=multiple");
            if(!resp.ok)throw new Error();
            data=await resp.json();
            if(data.results && data.results.length){qd=data.results[0];break;}
          }catch{await delay(220);}
        }
        if(!qd)break;
        
        let question=decodeHTMLEntities(qd.question);
        let correct=decodeHTMLEntities(qd.correct_answer);
        let allOpts=[qd.correct_answer,...qd.incorrect_answers].map(decodeHTMLEntities);
        let options=shuffle(allOpts).map((opt,i)=>({text:opt,isCorrect:opt===correct,n:i+1}));
        
        // Create translation promise
        let translationPromise = translateWithMyMemory(question, "ur");
        
        let entry={
          question, 
          options, 
          correct, 
          translationPromise: translationPromise,
          translation: ""
        };
        
        // Store translation when ready
        translationPromise.then(tr => {
          entry.translation = tr;
        });
        
        questionsQueue.push(entry);
      }
    }

    // --- Enable next button when both conditions are met
    function checkAndEnableNext() {
      if (canAnswer && translationCompleted) {
        nextQBtn.disabled = false;
      } else {
        nextQBtn.disabled = true;
      }
    }

    // --- Show current question with translation
    function showCurrentQuestion(){
      if(!questionsQueue.length){
        questionCard.innerHTML = `<center><span class=spinner></span> دوبارہ کوشش کریں ...</center>`;
        translationDiv.innerHTML="";
        timerDiv.innerHTML="";
        nextQBtn.disabled = true;
        return;
      }
      
      let q = questionsQueue[showingIndex];
      let opts = q.options.map((opt,i)=> 
        `<button class="option-btn" data-idx="${i}" data-correct="${opt.isCorrect}" disabled><span class="num">${i+1}</span>${opt.text}</button>`
      ).join("");
      questionCard.innerHTML=`<b>سوال نمبر ${qNumber}:</b> ${q.question}<div class="options">${opts}</div>`;
      
      likes = 0; 
      likeCountSpan.textContent = "0"; 
      likeBtn.disabled=false;
      
      // Reset flags
      canAnswer = false;
      translationCompleted = false;
      nextQBtn.disabled = true;
      
      timerDiv.innerHTML=`⏳ براہ کرم 5 سیکنڈ انتظار کریں ...`;
      
      // Show translation loading
      translationDiv.innerHTML = `<span class="spinner"></span> اردو ترجمہ لوڈ ہو رہا ہے...`;

      // Disable option buttons initially
      let optsBtns = [...questionCard.querySelectorAll('.option-btn')];
      optsBtns.forEach(b=>b.disabled=true);
      
      let count=5;
      if(timerI) clearInterval(timerI);
      
      timerI=setInterval(()=>{
        count--;
        if(count<=0){
          timerDiv.innerHTML=`<span style="color:#2fd467">✅ اب آپ جواب دے سکتے ہیں!</span>`;
          optsBtns.forEach(b=>b.disabled=false);
          canAnswer = true;
          checkAndEnableNext();
          
          // Option clicking
          optsBtns.forEach(btn=>{
            btn.onclick=function(){
              if(btn.classList.contains('selected')) return;
              optsBtns.forEach(b=>b.disabled=true);
              btn.classList.add('selected');
              if(btn.getAttribute('data-correct')==="true"){
                btn.innerHTML = `<span class="num">${+btn.getAttribute('data-idx')+1}</span>✅ ${btn.textContent.trim().replace(/^([0-9]+)\s*/, '')}`;
              }else{
                btn.innerHTML = `<span class="num">${+btn.getAttribute('data-idx')+1}</span>❌ ${btn.textContent.trim().replace(/^([0-9]+)\s*/, '')}`;
                let cidx = q.options.findIndex(opt=>opt.isCorrect);
                optsBtns[cidx].classList.add('selected');
              }
            };
          });
          clearInterval(timerI);
        }else{
          timerDiv.innerHTML = `⏳ ${count} سیکنڈ باقی ...`;
        }
      },1000);

      // Translation using MyMemory API
      q.translationPromise.then(tr=>{
        translationDiv.innerHTML = tr ? `🌐 <strong>اردو ترجمہ:</strong> ${tr}` : "ترجمہ دستیاب نہیں";
        translationCompleted = true;
        checkAndEnableNext();
      }).catch(()=>{
        translationDiv.innerHTML = "🌐 <strong>اردو ترجمہ:</strong> " + simpleFallbackTranslation(q.question);
        translationCompleted = true;
        checkAndEnableNext();
      });
    }

    // --- Like
    likeBtn.onclick = ()=>{likes++; likeCountSpan.textContent = likes; likeBtn.disabled = (likes>19);};

    // --- Next
    nextQBtn.onclick = async ()=>{
      if(questionsQueue.length > 1){
        questionsQueue.shift();
        qNumber++;
        showCurrentQuestion();
      }else{
        questionCard.innerHTML='<center><span class=spinner></span> اگلا سوال لا رہے ہیں ...</center>';
        translationDiv.innerHTML = '';
        timerDiv.innerHTML = '';
        nextQBtn.disabled = true;
        await prefetchQueue(4);
        showingIndex=0; 
        qNumber++;
        showCurrentQuestion();
      }
      prefetchQueue(4);
    };

    // --- INIT
    (async function(){
      questionCard.innerHTML = `<center><span class=spinner></span> سوالات لوڈ ہو رہے ہیں ...</center>`;
      translationDiv.innerHTML = '';
      timerDiv.innerHTML = '';
      nextQBtn.disabled = true;
      await prefetchQueue(4);
      showingIndex=0; 
      qNumber=1;
      showCurrentQuestion();
      prefetchQueue(4);
    })();
  </script>
</body>
</html>
